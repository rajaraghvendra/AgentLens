name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            src/apps/web/package-lock.json
            src/apps/vscode/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript
        run: npm run build

      - name: Build Web Dashboard
        working-directory: src/apps/web
        run: |
          npm install
          npm run build

      - name: Build VS Code extension
        working-directory: src/apps/vscode
        run: |
          npm install
          npm run build

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            src/apps/web/package-lock.json
            src/apps/vscode/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            src/apps/web/package-lock.json
            src/apps/vscode/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npm run lint

  package-smoke:
    name: Package Smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            src/apps/web/package-lock.json
            src/apps/vscode/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Build publishable package
        run: npm run build

      - name: Pack npm tarball
        run: |
          mkdir -p artifacts
          npm pack --pack-destination artifacts

      - name: Smoke test installed tarball
        run: |
          node scripts/ci/smoke-installed-package.mjs artifacts/*.tgz
