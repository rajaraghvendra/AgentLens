name: CD (Manual)

on:
  workflow_dispatch:
    inputs:
      publish_npm:
        description: 'Publish the CLI package to npmjs.com'
        required: false
        default: false
        type: boolean
      publish_marketplace:
        description: 'Publish the VS Code extension to the VS Code Marketplace'
        required: false
        default: false
        type: boolean

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install root dependencies
        run: npm ci

      - name: Build CLI
        run: npm run build

      - name: Run tests
        run: npm run test

      - name: Build web dashboard
        working-directory: src/apps/web
        run: |
          npm ci
          npm run build

      - name: Build VS Code extension
        working-directory: src/apps/vscode
        run: |
          npm ci
          npm run package

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: vscode-extension-vsix
          path: src/apps/vscode/*.vsix
          if-no-files-found: error

  publish-npm:
    needs: build
    if: ${{ inputs.publish_npm }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js for npm publish
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install root dependencies
        run: npm ci

      - name: Install web dependencies
        working-directory: src/apps/web
        run: npm ci

      - name: Build publishable package
        run: npm run build:all

      - name: Publish package to npmjs
        run: npm publish --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-marketplace:
    needs: build
    if: ${{ inputs.publish_marketplace }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install VS Code extension dependencies
        working-directory: src/apps/vscode
        run: npm ci

      - name: Publish extension to VS Code Marketplace
        working-directory: src/apps/vscode
        run: npm run publish
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
