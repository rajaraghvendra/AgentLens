  <text x="560" y="564" fill="#10b981" font-size="14">$52.18</text>
  <text x="700" y="564" fill="white" font-size="14">29.4M</text>
  <text x="870" y="564" fill="white" font-size="14">6,204</text>
  <rect x="1015" y="552" width="95" height="10" rx="5" fill="#1e293b"/>
  <rect x="1015" y="552" width="28" height="10" rx="5" fill="#f472b6"/>

  <rect x="60" y="586" width="1080" height="38" rx="8" fill="#0f172a"/>
  <text x="80" y="610" fill="white" font-size="14">minimax-m2.5-free</text>
  <text x="560" y="610" fill="#10b981" font-size="14">$28.74</text>
  <text x="700" y="610" fill="white" font-size="14">19.1M</text>
  <text x="870" y="610" fill="white" font-size="14">3,145</text>
