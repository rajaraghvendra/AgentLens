  <text x="560" y="518" fill="#10b981" font-size="14">$121.93</text>
  <text x="700" y="518" fill="white" font-size="14">38.5M</text>
  <text x="870" y="518" fill="white" font-size="14">8,930</text>
  <rect x="1015" y="506" width="95" height="10" rx="5" fill="#1e293b"/>
  <rect x="1015" y="506" width="46" height="10" rx="5" fill="#38bdf8"/>

  <rect x="60" y="540" width="1080" height="38" rx="8" fill="#111827"/>
