  <rect width="1200" height="700" fill="url(#bg)"/>

  <text x="40" y="50" fill="white" font-size="28" font-weight="bold">◊ AgentLens</text>
  <text x="40" y="76" fill="#94a3b8" font-size="14">Model and provider comparison view</text>

  <rect x="40" y="110" width="1120" height="70" rx="12" fill="url(#card)"/>
