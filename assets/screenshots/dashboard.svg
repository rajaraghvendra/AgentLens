  <text x="60" y="560" fill="#94a3b8" font-size="12">Top Activities</text>
  <rect x="60" y="575" width="200" height="8" rx="4" fill="#1e293b"/>
  <rect x="60" y="575" width="180" height="8" rx="4" fill="url(#primary)"/>
  <text x="270" y="582" fill="white" font-size="11">General 90%</text>
  <rect x="60" y="595" width="200" height="8" rx="4" fill="#1e293b"/>
  <rect x="60" y="595" width="40" height="8" rx="4" fill="#10b981"/>
  <text x="270" y="602" fill="white" font-size="11">Coding 10%</text>
  
  <text x="400" y="560" fill="#94a3b8" font-size="12">Models Used</text>
  <text x="400" y="585" fill="white" font-size="14">big-pickle</text>
  <text x="600" y="585" fill="#10b981" font-size="14">$198.45</text>
  <text x="400" y="610" fill="white" font-size="14">qwen3-coder:480b</text>
  <text x="600" y="610" fill="#10b981" font-size="14">$89.32</text>
  
  <!-- Warning Alert -->
  <rect x="40" y="690" width="1100" height="50" rx="8" fill="#7f1d1d" stroke="#ef4444" stroke-width="1"/>
  <text x="70" y="715" fill="#fca5a5" font-size="14">⚠️ HIGH: Edit Retry Loops Detected</text>
  <text x="450" y="715" fill="#fca5a5" font-size="12">An agent edited the same file 4 times in a row.</text>
</svg>