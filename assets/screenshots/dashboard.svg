  <rect x="430" y="280" width="25" height="140" rx="3" fill="url(#primary)"/>
  <rect x="470" y="310" width="25" height="110" rx="3" fill="url(#primary)"/>
  <rect x="510" y="340" width="25" height="80" rx="3" fill="url(#primary)"/>
  
