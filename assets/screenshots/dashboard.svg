  <rect x="150" y="480" width="80" height="35" rx="8" fill="#1e293b"/>
  <text x="190" y="502" fill="#94a3b8" font-size="13" text-anchor="middle">Optimize</text>
  <rect x="240" y="480" width="80" height="35" rx="8" fill="#1e293b"/>
  <text x="280" y="502" fill="#94a3b8" font-size="13" text-anchor="middle">Compare</text>
  
