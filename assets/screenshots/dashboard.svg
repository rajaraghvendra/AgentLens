  <rect x="620" y="290" width="500" height="35" rx="6" fill="#0f172a"/>
  <text x="640" y="313" fill="white" font-size="14">AgentLens</text>
  <text x="1050" y="313" fill="#10b981" font-size="14" font-weight="bold">$198.45</text>
  <rect x="620" y="335" width="500" height="35" rx="6" fill="#0f172a"/>
  <text x="640" y="358" fill="white" font-size="14">LLM</text>
  <text x="1050" y="358" fill="#10b981" font-size="14" font-weight="bold">$89.32</text>
  <rect x="620" y="380" width="500" height="35" rx="6" fill="#0f172a"/>
