  </defs>
  <rect width="1200" height="700" fill="url(#bg)"/>
  
  <!-- Header -->
  <text x="40" y="50" fill="white" font-size="28" font-weight="bold">◊ AgentLens</text>
  <text x="40" y="75" fill="#94a3b8" font-size="14">AI Developer Analytics Dashboard</text>
  
  <!-- Period Tabs -->
  <rect x="700" y="35" width="70" height="30" rx="15" fill="#6366f1"/>
