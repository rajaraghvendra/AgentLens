  <text x="500" y="170" fill="white" font-size="32" font-weight="bold">24.5M</text>
  <text x="500" y="195" fill="#64748b" font-size="11">Processed</text>
  
  <rect x="700" y="100" width="200" height="120" rx="12" fill="url(#card)"/>
